<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>절대 배치</title>
        <style>
            div {
                display: inline-block;
                position: absolute;
                border: 1px solid lightgray;
            }
            div > p {
                display: inline-block;
                position: absolute;
                height: 20px;
                width: 15px;
                background-color: lightgray;
            }
        </style>
    </head>
    <body>
        <h3>Merry Christmas!</h3>
        <hr>
        <p>예수님이 탄생하셨습니다.</p>
        <div>
            <img style="width: 200px; height: 200px;" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIlel_dxz223ONTdF_CMhc1e00OGotlRrmpA&s" alt="">
            <p style="left: 50px; top: 30px;">M</p>
            <p style="left: 100px; top: 0px;">E</p>
            <p style="left: 100px; top: 80px;">R</p>
            <p style="left: 150px; top: 110px;">R</p>
            <p style="left: 30px; top: 130px;">Y</p>
        </div>
    </body> 
</html>
