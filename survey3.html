<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>설문지</title>
</head>

<body>

<header>
    <h2>설문지</h2>
    소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여부탁드립니다.
    <hr>
</header>

<section>
<article>

<form>

    학년:
    <label><input type="radio" name="학년" value="1"> 1학년</label>
    <label><input type="radio" name="학년" value="2"> 2학년</label>
    <label><input type="radio" name="학년" value="3"> 3학년</label>

    <br><br>

    성별
    <label><input type="radio" name="성별" value="man"> 남</label>
    <label><input type="radio" name="성별" value="woman"> 여</label>

    <br><br>

    관심 분야
    <select name="관심분야">
        <option value="1">모바일 소프트웨어</option>
        <option value="2">모바일 소프트웨어2</option>
        <option value="3">모바일 소프트웨어3</option>
    </select>

    <br><br>

    진로 
    <label><input type="checkbox" name="진로" value="개발"> 개발</label>
    <label><input type="checkbox" name="진로" value="기획"> 기획</label>
    <label><input type="checkbox" name="진로" value="영업"> 영업</label>
    <label><input type="checkbox" name="진로" value="창업"> 창업</label>

    <br><br>
    
    남기고 싶은 말 
    <textarea rows="5" cols="20"></textarea>

</form>

</article>
</section>

<footer>
    <br><br>
    Copyright 2026 by MYONGJI COLLEGE
</footer>

</body>
</html>
