<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>색 이름과 코드</title>
    <style>
        table {
        margin: 20px;
        border: 1px black solid;
        }
        td {height: 20px;
            border: 1px black solid;
        }
        .Brown {
            background-color: #a52a2a; width: 50px;
        }
        .DeepSkyBlue {background-color: deepskyblue; width: 50px;}
        .Blueviolet {background-color: #8A2BE2; width: 50px;}
    </style>
</head>
<body>
    <h3>색 이름과 코드</h3>
    <hr>
    <table>
        <thead class="일">
            <td>이름</td>
            <td>코드</td>
            <td>색</td>
            <td>코드</td>
            <td>이름</td>
            <td>색</td>
        </thead>
        <tbody class="이">
            <div>
                <td>Brown</td>
                <td>#A52A2A</td>
                <td class="Brown"></td>
            </div>

            <div>
                <td>DeepSkyBlue</td>
                <td>#00BFFF</td>
                <td class="DeepSkyBlue"></td>
            </div>
        </tbody>

        <tbody class="삼">
            <div class="Blueviolet">
                <td>Blueviolet</td>
                <td>#8A2BE2</td>
                <td class="Blueviolet"></td>
            </div>

            <div class="gold">
                <td>gold</td>
                <td>#FFD700</td>
                <td></td>
            </div>
        </tbody>

        <tbody class="사">
            <div class="DarkOrange">
                <td>DarkOrange</td>
                <td>#FF8C00</td>
                <td style="background-color: #FF8C00;width: 50px;"></td>
            </div>

            <div class="OliveDrab">
                <td>OliveDrab</td>
                <td>#6B8E23</td>
                <td style="background-color: #6B8E23; width: 50px;"></td>
            </div>
        </tbody>
    </table>
</body>
</html>
