<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>도형 서식 폼</title>
    </head>
    <body>
        <h3>도형 서식 폼 만들기</h3>
        <hr>
        <form>
            <fieldset>
            <legend>회원 서식 입력</legend>
            선종류
            <select>
                <option value="1">선없음</option>
                <option value="2">실선</option>
                <option value="3">점선</option>
            </select><br>

            선두께 <input type="text">
            선색 <input type="color"> <br>

            투명도(0~100) : <input type="range" list="t" min="0" max="100">
            <datalist id="t">
                <option value="0"></option>
                <option value="100"></option>
            </datalist>
        </fieldset>
        </form>
    </body>
</html>
